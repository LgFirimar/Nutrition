// ── EditQuickFoodModal ─────────────────────────────────────────────────────────
function EditQuickFoodModal({food,onSave,onClose}){
  const [label,setLabel]=useState(food.label);
  const [desc,setDesc]=useState(food.label);
  const [loading,setLoading]=useState(false);
  const [kcal,setKcal]=useState(String(food.kcal));
  const [carbs,setCarbs]=useState(String(food.carbs));
  const [protein,setProtein]=useState(String(food.protein||0));
  const [fat,setFat]=useState(String(food.fat||0));
  const [error,setError]=useState(null);

  const ask=async()=>{
    if(!desc.trim())return;
    setLoading(true);setError(null);
    try{
      const res=await fetch("https://nutrition-ai.lior0gal.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mealDescription:desc})
      });
      if(!res.ok) throw new Error("שגיאת שרת");
      const d=await res.json();
      if(d.error||!d.kcal) throw new Error(d.error||"תגובה לא תקינה");
      setKcal(String(d.kcal));
      setCarbs(String(d.carbs||0));
      setProtein(String(d.protein||0));
      setFat(String(d.fat||0));
      if(d.label) setLabel(d.label);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const save=()=>{
    onSave({...food,label,kcal:parseFloat(kcal)||0,carbs:parseFloat(carbs)||0,protein:parseFloat(protein)||0,fat:parseFloat(fat)||0});
  };

  const numField=(v,s,p,col)=>(
    <div className="num-wrap">
      <input type="number" value={v} onChange={e=>s(e.target.value)} style={{borderColor:v?col:C.border}}/>
      <div className="num-lbl" style={{color:col}}>{p}</div>
    </div>
  );

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet slide">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700}}>✏️ עריכת כפתור</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}}>×</button>
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>שם הכפתור</div>
        <input value={label} onChange={e=>setLabel(e.target.value)} className="inp" style={{marginBottom:12,borderColor:label?C.accent:C.border}}/>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>תיאור לחישוב ע״י Claude</div>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3}
          placeholder="תארי בחופשיות, למשל: אצבע גבינה צהובה 20g"
          className="inp" style={{marginBottom:8,resize:"none",lineHeight:1.5,fontSize:13}}/>
        <button onClick={ask} disabled={loading}
          style={{width:"100%",background:"linear-gradient(135deg,#5a9e1e,#7bc42e)",border:"none",borderRadius:8,color:"#fff",padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {loading?<span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>:"✨"}
          {loading?"מחשב...":"חשב עם Claude"}
        </button>
        {error&&<div style={{fontSize:11,color:C.danger,marginBottom:8,textAlign:"center"}}>⚠ {error}</div>}
        <div className="g2" style={{marginBottom:14}}>
          {[["kcal",kcal,setKcal,"קק״ל",C.accent],["carbs",carbs,setCarbs,"פחמ׳ g",C.warn],["protein",protein,setProtein,"חלבון g",C.blue],["fat",fat,setFat,"שומן g","#999"]].map(([k,v,s,p,c])=>(
            <div key={k} className="num-wrap">
              <input type="number" value={v} onChange={e=>s(e.target.value)} style={{borderColor:v?c:C.border}}/>
              <div className="num-lbl" style={{color:c}}>{p}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} className="btn-muted" style={{flex:1}}>ביטול</button>
          <button onClick={save} disabled={!label||!kcal}
            style={{flex:2,background:label&&kcal?C.accent:"#ddd",border:"none",borderRadius:8,color:label&&kcal?"#fff":"#aaa",padding:"10px",fontSize:13,fontWeight:700,cursor:label&&kcal?"pointer":"default"}}>
            💾 שמור
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SplashScreen ───────────────────────────────────────────────────────────────
function SplashScreen({onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,background:"linear-gradient(170deg,#f4fcec,#d4f0b8)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{background:"#fff",border:"2px solid #5a9e1e",borderRadius:14,padding:"10px 20px",textAlign:"center",boxShadow:"0 4px 12px rgba(90,158,30,0.15)"}}>
        <div style={{fontSize:15,fontWeight:900,color:"#1a3a05"}}>לא דיאטה,</div>
        <div style={{fontSize:15,fontWeight:900,color:"#5a9e1e"}}>אורח חיים</div>
      </div>
      <div style={{fontSize:90}}>🥑</div>
      <div style={{fontSize:24,fontWeight:900,color:"#1e4a06"}}>מעקב תזונה</div>
      <div style={{fontSize:12,color:"#4a7a10",letterSpacing:1}}>חכם · מהיר · מדויק</div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  const [profiles,setProfiles]=useState(()=>loadProfiles());
  const [activeProfile,setActiveProfile]=useState(()=>{
    const id=loadActiveProfileId();
    const all=loadProfiles();
    return all.find(p=>p.id===id)||all[0]||null;
  });
  const [showSetup,setShowSetup]=useState(()=>loadProfiles().length===0);
  const [showSplash,setShowSplash]=useState(true);
  const pid=activeProfile?.id||"default";
  window._activePid=pid;
  const MAX_KCAL=activeProfile?.maxKcal||1800;
  const MAX_CARBS=activeProfile?.maxCarbs||80;

  const [entries,setEntries]=useState([]);

  const switchProfile=(p)=>{
    setActiveProfile(p);
    saveActiveProfileId(p?.id);
    const fresh=loadProfiles();
    setProfiles(fresh);
    setEntries([]);
    setCustomBtns(loadCustomBtns(p?.id));
    setActiveDate(getTodayKey());
  };

  const [showSmart,setShowSmart]=useState(false);
  const [showMeal,setShowMeal]=useState(false);
  const [showPhoto,setShowPhoto]=useState(false);
  const [bloodSugar,setBloodSugar]=useState("");
  const [editingQuickFood,setEditingQuickFood]=useState(null);
  const [showJournal,setShowJournal]=useState(false);
  const [showNewBtn,setShowNewBtn]=useState(false);
  const [showDB,setShowDB]=useState(false);
  const [showProfiles,setShowProfiles]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [customBtns,setCustomBtns]=useState(()=>loadCustomBtns(pid));
  const [saveFlash,setSaveFlash]=useState(false);
  const [activeDate,setActiveDate]=useState(()=>getTodayKey());
  const [showDatePicker,setShowDatePicker]=useState(false);

  useEffect(()=>{
    const j=loadJournal(pid);
    setBloodSugar(j[activeDate]?.bloodSugar||"");
  },[activeDate,pid]);

  const saveBloodSugar=(val)=>{
    const j=loadJournal(pid);
    if(!j[activeDate]) j[activeDate]={entries:[],totals:{kcal:0,carbs:0,protein:0}};
    if(val) j[activeDate].bloodSugar=parseFloat(val);
    else delete j[activeDate].bloodSugar;
    saveJournal(j,pid);
  };

  const copyPrevDay=()=>{
    const prev=new Date();prev.setDate(prev.getDate()-1);
    const pKey=`${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}-${String(prev.getDate()).padStart(2,'0')}`;
    const j=loadJournal(pid);
    if(j[pKey]) setEntries(j[pKey].entries.map(e=>({...e,uid:Date.now()+Math.random()})));
  };

  const isToday = activeDate === getTodayKey();
  const savedToday = !!loadJournal(pid)[activeDate];

  const totals=entries.reduce((acc,e)=>({kcal:acc.kcal+e.kcal,carbs:acc.carbs+e.carbs,protein:acc.protein+e.protein}),{kcal:0,carbs:0,protein:0});
  const addEntry=food=>setEntries(prev=>[...prev,{...food,uid:food.uid||(Date.now()+Math.random())}]);
  const removeEntry=uid=>setEntries(prev=>prev.filter(e=>e.uid!==uid));
  const updateEntry=(uid,ch)=>setEntries(prev=>prev.map(e=>e.uid===uid?{...e,...ch}:e));
  const clearAll=()=>setEntries([]);

  const saveDay=()=>{
    if(!entries.length&&!bloodSugar)return;
    const j=loadJournal(pid);
    j[activeDate]={entries:entries.map(e=>({label:e.label,kcal:e.kcal,carbs:e.carbs,protein:e.protein})),totals,...(bloodSugar&&{bloodSugar:parseFloat(bloodSugar)})};
    saveJournal(j,pid);
    setSaveFlash(true);
    setTimeout(()=>setSaveFlash(false),1800);
  };

  // generate last 14 days for picker
  const last14=Array.from({length:14},(_,i)=>{
    const d=new Date();
    d.setDate(d.getDate()-i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });

  const selectDate=key=>{
    const j=loadJournal(pid);
    if(j[key]){
      setEntries(j[key].entries.map(e=>({...e,uid:Date.now()+Math.random()})));
    } else {
      setEntries([]);
    }
    setActiveDate(key);
    setShowDatePicker(false);
  };

  const [quickFoods,setQuickFoods]=useState(()=>loadQuickFoods(pid)||QUICK_FOODS);
  const [showEditQuick,setShowEditQuick]=useState(false);

  const saveNewBtn=btn=>{const u=[...customBtns,btn];setCustomBtns(u);saveCustomBtns(u,pid);};
  const updateCustomBtn=(id,ch)=>{const u=customBtns.map(b=>b.id===id?{...b,...ch}:b);setCustomBtns(u);saveCustomBtns(u,pid);};
  const removeBtn=id=>{const u=customBtns.filter(b=>b.id!==id);setCustomBtns(u);saveCustomBtns(u,pid);};
  const updateQuickFood=(id,changes)=>{const u=quickFoods.map(f=>f.id===id?{...f,...changes}:f);setQuickFoods(u);saveQuickFoods(u,pid);};
  const removeQuickFood=(id)=>{const u=quickFoods.filter(f=>f.id!==id);setQuickFoods(u);saveQuickFoods(u,pid);};
  const resetQuickFoods=()=>{setQuickFoods(QUICK_FOODS);saveQuickFoods(QUICK_FOODS,pid);ls.set("nutrition_hidden_special",[]);ls.set("nutrition_special_edits",{});};
  const kcalLeft=MAX_KCAL-totals.kcal, carbsLeft=MAX_CARBS-totals.carbs;
  const maxProtein=activeProfile?.maxProtein||120;

  if(showSetup||!activeProfile) return (
    <SetupScreen onDone={(p)=>{
      const updated=[p];
      saveProfiles(updated);
      saveActiveProfileId(p.id);
      setProfiles(updated);
      setActiveProfile(p);
      setShowSetup(false);
    }}/>
  );

  return (
    <div>
      {showSplash && <SplashScreen onDone={()=>setShowSplash(false)}/>}
      {showProfiles && <ProfileModal profiles={profiles} activeId={pid} onSelect={switchProfile} onClose={()=>setShowProfiles(false)}/>}
      {showExport && <ExportImportModal pid={pid} onClose={()=>setShowExport(false)}/>}
      {showJournal && <JournalView pid={pid} onClose={()=>setShowJournal(false)} onLoadDay={saved=>{setEntries(saved.map(e=>({...e,uid:Date.now()+Math.random()})));setShowJournal(false);}}/>}
      {showNewBtn && <NewButtonModal onClose={()=>setShowNewBtn(false)} onSave={saveNewBtn}/>}
      {showDB && <DBManagerModal pid={pid} onClose={()=>setShowDB(false)}/>}
      {editingQuickFood && <EditQuickFoodModal food={editingQuickFood} onSave={f=>{
        if(f._type==='var') saveSpecialEdit(`var_${f._key}`,{kcal:f.kcal,carbs:f.carbs,protein:f.protein,fat:f.fat,label:f.label});
        else if(f._type==='yogurt') saveSpecialEdit('yogurt',{kcal:f.kcal,carbs:f.carbs,protein:f.protein,fat:f.fat,label:f.label});
        else if(f._type==='coffee') saveSpecialEdit('coffee',{kcal:f.kcal,carbs:f.carbs,protein:f.protein,fat:f.fat,label:f.label});
        else if(f._type==='custom') updateCustomBtn(f.id,f);
        else updateQuickFood(f.id,f);
        setEditingQuickFood(null);
      }} onClose={()=>setEditingQuickFood(null)}/>}

      {/* Header */}
      <div id="header">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{cursor:"pointer"}} onClick={()=>setShowDatePicker(v=>!v)}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase"}}>
              {isToday ? `מעקב תזונה — ${activeProfile?.name}` : "✏️ הזנה בדיעבד"}
            </div>
            <div style={{fontSize:13,color:isToday?C.accent:C.warn,marginTop:2,display:"flex",alignItems:"center",gap:4}}>
              {getDateLabel(activeDate)} <span style={{fontSize:11}}>▾</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {entries.length>0 && <button onClick={clearAll} style={{background:"none",border:"1px solid #e0e0e5",color:C.muted,fontSize:10,padding:"5px 10px",borderRadius:6,cursor:"pointer"}}>נקה</button>}
            <button onClick={copyPrevDay} style={{background:"none",border:"1px solid #e0e0e5",color:C.muted,fontSize:10,padding:"5px 10px",borderRadius:6,cursor:"pointer"}}>📋 אתמול</button>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <button onClick={saveDay} style={{background:saveFlash?C.accent:"#fff",border:`1px solid ${saveFlash?C.accent:savedToday?C.accent+"66":"#e0e0e5"}`,borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,transition:"all 0.3s",animation:saveFlash?"pop 0.35s ease":"none"}}>💾</button>
              {savedToday&&!saveFlash && <span style={{fontSize:9,color:C.accent,whiteSpace:"nowrap"}}>עודכן</span>}
              {saveFlash && <span style={{fontSize:9,color:C.accent}}>✓ נשמר</span>}
            </div>
            <button onClick={()=>setShowExport(true)} style={{background:"#fff",border:"1px solid #e0e0e5",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📤</button>
            <button onClick={()=>setShowJournal(true)} style={{background:"#fff",border:"1px solid #e0e0e5",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📓</button>
            <button onClick={()=>setShowDB(true)} style={{background:"#fff",border:"1px solid #e0e0e5",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🗂</button>
            <button onClick={()=>setShowProfiles(true)} style={{background:"#fff",border:"1px solid #e0e0e5",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}} title={activeProfile?.name}>{activeProfile?.emoji}</button>
          </div>
        </div>

        {/* Date picker dropdown */}
        {showDatePicker && (
          <div style={{marginBottom:12,background:"#f5f5f7",borderRadius:10,overflow:"hidden",border:"1px solid #e0e0e5",animation:"fadeIn 0.15s ease"}}>
            {last14.map(key=>{
              const isActive=key===activeDate;
              const hasSaved=!!loadJournal(pid)[key];
              const isT=key===getTodayKey();
              return (
                <div key={key} onClick={()=>selectDate(key)}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 16px",borderBottom:"1px solid #e0e0e5",cursor:"pointer",background:isActive?"rgba(90,158,30,0.1)":"#fff"}}>
                  <span style={{fontSize:13,color:isActive?C.accent:C.text,fontWeight:isActive?700:400}}>
                    {isT?"היום — ":""}{getDateLabel(key)}
                  </span>
                  {hasSaved && <span style={{fontSize:10,color:C.accent,background:"rgba(90,158,30,0.12)",padding:"2px 8px",borderRadius:10}}>שמור</span>}
                </div>
              );
            })}
          </div>
        )}
        <div className="g3">
          {[{val:Math.round(totals.kcal),unit:"קק״ל",max:MAX_KCAL,left:Math.max(0,Math.round(kcalLeft)),color:C.accent},
            {val:totals.carbs.toFixed(1),unit:"פחמימות g",max:MAX_CARBS,left:Math.max(0,carbsLeft).toFixed(1)+"g",color:C.warn},
            {val:totals.protein.toFixed(1),unit:"חלבון g",max:maxProtein,left:Math.max(0,maxProtein-totals.protein).toFixed(1)+"g",color:C.blue}
          ].map(({val,unit,max,left,color})=>(
            <div key={unit} className="stat-box">
              <div className="stat-val" style={{color}}>{val}</div>
              <div className="stat-unit">{unit}</div>
              <StatBar value={parseFloat(val)} max={max} color={color}/>
              <div className="stat-left">נותר: {left}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Blood Sugar */}
      <div style={{margin:"8px 16px 0",background:"#fff",border:"1px solid #e0e0e5",borderRadius:10,padding:"8px 14px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13}}>🩸</span>
        <span style={{fontSize:12,color:C.muted,flex:1}}>סוכר בוקר</span>
        <input type="number" value={bloodSugar} onChange={e=>setBloodSugar(e.target.value)}
          onBlur={e=>saveBloodSugar(e.target.value)}
          placeholder="— mg/dL" style={{width:90,background:"transparent",border:"none",textAlign:"left",fontSize:13,fontWeight:700,color:"#e03e3e",fontFamily:"inherit"}}/>
      </div>

      {/* Quick Add */}
      <div style={{padding:"16px 16px 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:1.5}}>הוספה מהירה</div>
          <div style={{display:"flex",gap:6}}>
            {showEditQuick && <button onClick={resetQuickFoods} style={{background:"none",border:"1px solid #e0e0e5",borderRadius:16,padding:"4px 10px",fontSize:11,color:C.muted,cursor:"pointer"}}>↺ אפס</button>}
            <button onClick={()=>setShowEditQuick(v=>!v)} style={{background:showEditQuick?"#fff8e1":"none",border:`1px solid ${showEditQuick?C.warn:"#e0e0e5"}`,borderRadius:16,padding:"4px 10px",fontSize:11,color:showEditQuick?C.warn:C.muted,cursor:"pointer"}}>{showEditQuick?"✓ סיום":"✏️ ערוך"}</button>
            <button onClick={()=>setShowNewBtn(true)} style={{background:"none",border:"1px solid #e0e0e5",borderRadius:16,padding:"4px 10px",fontSize:11,color:C.muted,cursor:"pointer"}}>⭐ חדש</button>
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {quickFoods.map(food=>(
            <QuickFoodChip key={food.id} food={food} onAdd={addEntry}
              editMode={showEditQuick} onRemove={removeQuickFood} onEdit={setEditingQuickFood}/>
          ))}
          {!isHiddenSpecial('var_crackers')&&<VarButton foodKey="crackers" onAdd={addEntry} editMode={showEditQuick} onEdit={f=>{if(f)setEditingQuickFood(f);}}/>}
          {!isHiddenSpecial('var_granola')&&<VarButton foodKey="granola" onAdd={addEntry} editMode={showEditQuick} onEdit={f=>{if(f)setEditingQuickFood(f);}}/>}
          {!isHiddenSpecial('yogurt')&&<YogurtBtn onAdd={addEntry} editMode={showEditQuick} onEdit={f=>{if(f)setEditingQuickFood(f);}}/>}
          {!isHiddenSpecial('coffee')&&<CoffeeBtn onAdd={addEntry} editMode={showEditQuick} onEdit={f=>{if(f)setEditingQuickFood(f);}}/>}
          {customBtns.map(btn=>(
            <div key={btn.id} style={{position:"relative"}}>
              <button className="chip chip-yellow" onClick={()=>showEditQuick?null:addEntry(btn)} style={{paddingLeft:26,opacity:showEditQuick?0.7:1}}>
                <span>{btn.label}</span>
                <span className="chip-sub">{btn.kcal} קק״ל · {btn.carbs}g פחמ׳</span>
              </button>
              <button onClick={()=>removeBtn(btn.id)} style={{position:"absolute",top:4,left:6,background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",lineHeight:1,padding:0}}>×</button>
              {showEditQuick&&<button onClick={()=>setEditingQuickFood({...btn,_type:'custom'})}
                style={{position:"absolute",top:-4,right:-4,background:C.warn,border:"none",borderRadius:"50%",width:18,height:18,color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✏</button>}
            </div>
          ))}
          <button onClick={()=>{setShowPhoto(v=>!v);setShowMeal(false);setShowSmart(false);}} style={{background:showPhoto?"#1a6b9e":"transparent",border:`1px dashed ${showPhoto?"#1a6b9e":"#e0e0e5"}`,color:showPhoto?"#fff":C.muted,padding:"8px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600}}>📷 תמונה</button>
          <button onClick={()=>{setShowMeal(v=>!v);setShowSmart(false);setShowPhoto(false);}} style={{background:showMeal?"#5a3e8e":"transparent",border:`1px dashed ${showMeal?"#5a3e8e":"#e0e0e5"}`,color:showMeal?"#fff":C.muted,padding:"8px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600}}>🍽 ארוחה</button>
          <button onClick={()=>{setShowSmart(v=>!v);setShowMeal(false);}} style={{background:showSmart?C.accent:"transparent",border:`1px dashed ${showSmart?C.accent:"#e0e0e5"}`,color:showSmart?"#fff":C.muted,padding:"8px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600}}>+ הוספה</button>
        </div>
      </div>

      {showPhoto && <PhotoMealPanel onAdd={addEntry} onClose={()=>setShowPhoto(false)}/>}
      {showMeal && <MealPanel onAdd={addEntry} onClose={()=>setShowMeal(false)}/>}
      {showSmart && <SmartAddPanel onAdd={addEntry} onClose={()=>setShowSmart(false)}/>}

      {/* Log */}
      <div style={{margin:"12px 16px 0"}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:1.5,marginBottom:8}}>יומן היום ({entries.length} פריטים)</div>
        {entries.length===0
          ? <div className="card" style={{padding:"30px 20px",textAlign:"center",color:C.muted,fontSize:13}}>לחצי על מאכל להוספה</div>
          : <div className="card">
              {entries.map(e=><EntryRow key={e.uid} entry={e} onRemove={removeEntry} onUpdate={updateEntry}/>)}
              <div className="summary-row">
                <span style={{fontSize:12,fontWeight:700,color:C.accent}}>סה״כ</span>
                <span style={{fontSize:12,color:C.accent}}>{Math.round(totals.kcal)} קק״ל · {totals.carbs.toFixed(1)}g פחמ׳ · {totals.protein.toFixed(1)}g חלבון</span>
              </div>
            </div>
        }
      </div>
      {entries.length>0 && <div style={{textAlign:"center",marginTop:16,fontSize:11,color:C.muted}}>לחצי על 💾 לשמירת היום ביומן</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>

name: Deploy TaskUp

on:
  push:
    branches: [main, claude/task-organization-app-ix7rgt]
    paths:
      - 'task-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: task-app
      - run: npm run build
        working-directory: task-app
      - run: npx wrangler pages deploy dist --project-name=taskup --commit-dirty=true
        working-directory: task-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

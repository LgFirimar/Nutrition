<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Plate circle -->
  <circle cx="256" cy="240" r="150" fill="none" stroke="white" stroke-width="22" opacity="0.9"/>
  <!-- Fork left -->
  <g stroke="white" stroke-width="18" stroke-linecap="round" fill="none">
    <line x1="186" y1="130" x2="186" y2="210"/>
    <line x1="206" y1="130" x2="206" y2="210"/>
    <line x1="186" y1="210" x2="206" y2="210"/>
    <line x1="196" y1="210" x2="196" y2="310"/>
    <line x1="166" y1="130" x2="166" y2="175"/>
    <line x1="226" y1="130" x2="226" y2="175"/>
  </g>
  <!-- Leaf / spoon right -->
  <ellipse cx="326" cy="185" rx="28" ry="50" fill="white" opacity="0.9" transform="rotate(-15 326 185)"/>
  <line x1="318" y1="228" x2="318" y2="315" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Small leaf accent -->
  <ellipse cx="370" cy="340" rx="26" ry="14" fill="#a7f3d0" opacity="0.85" transform="rotate(-35 370 340)"/>
  <ellipse cx="390" cy="358" rx="22" ry="12" fill="#6ee7b7" opacity="0.75" transform="rotate(-20 390 358)"/>
  <!-- Hebrew letter ת small at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="72" fill="white" opacity="0.92">תזונה</text>
</svg>
